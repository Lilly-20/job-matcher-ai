<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      width: 220px;
      font-family: "Microsoft YaHei", sans-serif;
      margin: 0;
      background: #f5f7fa;
      padding: 16px;
      box-sizing: border-box;
    }
    h2 {
      font-size: 14px;
      color: #333;
      margin: 0 0 8px;
      text-align: center;
    }
    p {
      font-size: 11px;
      color: #888;
      margin: 0 0 12px;
      text-align: center;
      line-height: 1.5;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #4338ca; }
  </style>
</head>
<body>
  <h2>🎯 Job Matcher AI</h2>
  <p>点击下方按钮，在当前页面打开悬浮窗。窗口固定在页面上，切换标签也不会消失。</p>
  <button id="toggleBtn">打开 / 关闭 悬浮窗</button>
  <script src="popup.js"></script>
</body>
</html>
